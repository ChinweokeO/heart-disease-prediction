data:
  raw_data_path: data/heart_disease.csv
  test_size: 0.2
  random_state: 42

model:
  type: RandomForestClassifier
  n_estimators: 200
  max_depth: null
  min_samples_split: 5
  min_samples_leaf: 2
  class_weight: balanced
  n_jobs: -1

training:
  target_column: num

metrics:
  primary_metric: f1_score
  minimum_f1: 0.60
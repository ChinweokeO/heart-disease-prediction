name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run tests
        run: pytest tests/ -v

  train:
    needs: test
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup DVC remote
        run: |
          # Use the configured DagsHub origin remote for pulls.
          # If auth is required, configure GitHub Secrets for DVC_USER and DVC_PASSWORD.
          dvc remote list

      - name: Prepare DVC workspace
        run: |
          dvc status
          dvc pull
          dvc checkout

      - name: Verify data exists
        run: ls data/

      - name: Train model
        run: python src/train.py